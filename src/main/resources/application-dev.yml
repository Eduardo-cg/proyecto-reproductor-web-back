app:
  jwt:
    secret: ${JWT_SECRET:-dev-secret-key-must-be-at-least-32-characters-long-for-hs256}
    expiration: 86400000
  storage:
    base-path: ${STORAGE_PATH:C:/temp/music-storage}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.musicstreaming: DEBUG
    org.springframework.security: DEBUG
