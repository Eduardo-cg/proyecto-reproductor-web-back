server:
  port: 8080

spring:
  application:
    name: music-streaming-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:musicdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      max-size: 20
      max-idle-time: 30s

  default:
    charset: UTF-8

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
    expiration: 86400000  # 24 hours in ms

  storage:
    base-path: ${STORAGE_PATH:/data/audio}
    max-file-size: 524288000  # 500MB

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.musicstreaming: DEBUG
    org.springframework.security: DEBUG
    reactor.netty: DEBUG