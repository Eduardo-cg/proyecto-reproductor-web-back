server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: FonoPort  # Sincronizado con pom.xml (app.name) y front/src/config.ts (APP_NAME)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:musicdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  default:
    charset: UTF-8

app:
  jwt:
    expiration: 86400000

  storage:
    max-file-size: 524288000

  cache:
    artist-image:
      max-size: 300
      ttl: 1h
    track-cover:
      max-size: 500
      ttl: 1h
    album-cover:
      max-size: 200
      ttl: 1h
    artist-track-cover:
      max-size: 300
      ttl: 1h
    file-metadata:
      max-size: 2000
      ttl: 1h

  security:
    rate-limit:
      login-limit: 10
      register-limit: 5
      window-ms: 60000

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
  health:
    r2dbc:
      enabled: true
    db:
      enabled: true
  info:
    java:
      enabled: true
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.musicstreaming: INFO
    org.springframework.security: WARN
    reactor.netty: WARN
